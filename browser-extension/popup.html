<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeNet AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      background: #111118;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 15px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00e676;
      box-shadow: 0 0 6px #00e676;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Current site result */
    .site-card {
      margin: 12px;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .site-card.low    { background: rgba(0,184,124,0.08); border-color: rgba(0,184,124,0.25); }
    .site-card.medium { background: rgba(255,107,0,0.08); border-color: rgba(255,107,0,0.25); }
    .site-card.high   { background: rgba(255,45,45,0.08);  border-color: rgba(255,45,45,0.25); }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .severity-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .severity-badge.low    { background: rgba(0,184,124,0.2);  color: #00e676; }
    .severity-badge.medium { background: rgba(255,107,0,0.2);  color: #ffaa00; }
    .severity-badge.high   { background: rgba(255,45,45,0.2);  color: #ff6666; }

    .score-display {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
    }
    .score-display.low    { color: #00e676; }
    .score-display.medium { color: #ffaa00; }
    .score-display.high   { color: #ff4444; }

    .score-sub { font-size: 11px; color: #666; }

    .domain-text {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-reason {
      font-size: 11px;
      color: #ccc;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      line-height: 1.4;
    }

    /* Manual scan */
    .scan-section {
      padding: 0 12px 12px;
    }

    .scan-input-row {
      display: flex;
      gap: 6px;
    }

    .scan-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 10px;
      color: white;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    .scan-input::placeholder { color: #555; }
    .scan-input:focus { border-color: rgba(0,114,255,0.5); }

    .scan-btn {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }

    .scan-btn:hover { opacity: 0.9; }
    .scan-btn:disabled { opacity: 0.5; cursor: default; }

    /* Stats footer */
    .stats-bar {
      display: flex;
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      gap: 12px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #00c6ff;
    }

    .stat-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #555;
      font-size: 12px;
      gap: 8px;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #00c6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 0 12px 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      SafeNet AI
    </div>
    <div class="status-dot" title="Protection active"></div>
  </div>

  <!-- Current page result -->
  <div id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      Scanning current page...
    </div>
  </div>

  <!-- Manual scan -->
  <div class="divider"></div>
  <div class="scan-section">
    <div class="scan-input-row">
      <input
        type="text"
        class="scan-input"
        id="manual-url"
        placeholder="Paste any URL to scan..."
      />
      <button class="scan-btn" id="manual-scan-btn">
        Scan
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-total">--</div>
      <div class="stat-label">Scans Today</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-blocked">--</div>
      <div class="stat-label">Blocked</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-blacklist">--</div>
      <div class="stat-label">Blacklisted</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
