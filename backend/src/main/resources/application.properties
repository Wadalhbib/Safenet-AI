# =============================================
# SafeNet AI - Application Configuration
# =============================================

# Server
server.port=8080
server.servlet.context-path=/

# SQLite Database
spring.datasource.url=jdbc:sqlite:safenet.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seed data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# App info for /actuator/info
info.app.name=SafeNet AI
info.app.version=1.0.0
info.app.description=Malaysian Scam Detection Engine
info.app.hackathon=ICYOUTH 2026

# Logging
logging.level.com.safenet=INFO
logging.level.org.springframework.web=WARN
