version: "3.9"

# SafeNet AI — Docker Compose
# Starts the Java backend in a container.
# Run: docker-compose up --build
#
# The browser extension and mobile app connect to:
#   http://localhost:8080/v1

services:
  safenet-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safenet-backend
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database outside the container
      - safenet-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/safenet.db
      - FIREBASE_SERVER_KEY=${FIREBASE_SERVER_KEY:-DEMO_MODE}
      - SERVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  safenet-data:
    driver: local
